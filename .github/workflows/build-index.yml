name: Build OCCL Index

on:
  push:
    branches: [main]
    paths:
      - "Components/**"
      - "Connectors/**"
      - "scripts/build_occl_index.py"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-index:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build OCCL-index.json
        run: python3 scripts/build_occl_index.py

      - name: Commit updated index
        run: |
          git config user.name "occl-index-bot"
          git config user.email "actions@users.noreply.github.com"
          git add OCCL-index.json
          if git diff --cached --quiet; then
            echo "Index unchanged, nothing to commit."
          else
            git commit -m "Regenerate OCCL-index.json [skip ci]"
            git push
          fi
